<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Gemi Aurni</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(270deg,#ff6ec4,#7873f5,#42e695);
    background-size: 600% 600%;
    animation: bg 10s ease infinite;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

@keyframes bg {
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

.container {
    padding: 30px;
}

/* FOTO UTAMA */
.main-img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
    box-shadow: 0 0 25px white;
    animation: float 3s infinite;
}

@keyframes float {
    0%,100%{transform: translateY(0)}
    50%{transform: translateY(-10px)}
}

h1 {
    margin-top: 10px;
    font-size: 40px;
    text-shadow: 0 0 20px white;
}

p {
    margin: 10px 0 20px;
}

/* GRID FOTO */
.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    max-width: 650px;
    margin: auto;
}

.gallery img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    border-radius: 15px;
    transition: 0.3s;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px white;
}

/* LIGHTBOX */
.lightbox {
    position: fixed;
    display: none;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.lightbox img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 15px;
}

/* BALON */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 40px;
    height: 60px;
    border-radius: 50%;
    animation: up 6s linear infinite;
}

@keyframes up {
    to {transform: translateY(-1000px);}
}

/* CONFETTI */
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    top: 0;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    to {transform: translateY(900px);}
}

/* TOMBOL MUSIK */
.music-btn {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <img src="gemiutama.jpg" class="main-img">

    <h1>🎉 Happy Birthday 🎉</h1>
    <h2>Gemi Aurni</h2>

    <p>Semoga panjang umur, sehat selalu, dan semua impianmu tercapai ✨</p>

    <div class="gallery">
        <img src="gemi1.jpg" onclick="openImg(this.src)">
        <img src="gemi2.jpg" onclick="openImg(this.src)">
        <img src="gemi3.jpg" onclick="openImg(this.src)">
        <img src="gemi4.jpg" onclick="openImg(this.src)">
        <img src="gemi5.jpg" onclick="openImg(this.src)">
        <img src="gemi6.jpg" onclick="openImg(this.src)">
        <img src="gemi7.jpg" onclick="openImg(this.src)">
        <img src="gemi8.jpg" onclick="openImg(this.src)">
        <img src="gemi9.jpg" onclick="openImg(this.src)">
    </div>

    <!-- AUDIO -->
    <audio id="music" loop>
        <source src="hbd.mp3" type="audio/mpeg">
    </audio>

    <button class="music-btn" onclick="playMusic()">▶️ Putar Musik</button>

</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
    <img id="lightImg">
</div>

<script>
// LIGHTBOX
function openImg(src){
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightImg").src=src;
}
function closeImg(){
    document.getElementById("lightbox").style.display="none";
}

// MUSIK (biar pasti jalan)
function playMusic(){
    document.getElementById("music").play();
}

// BALON
setInterval(()=>{
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*window.innerWidth+"px";
    b.style.background=`hsl(${Math.random()*360},70%,60%)`;
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),6000);
},300);

// CONFETTI
setInterval(()=>{
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*window.innerWidth+"px";
    c.style.background=`hsl(${Math.random()*360},70%,60%)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
},120);
</script>

</body>
</html>
